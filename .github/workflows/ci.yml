name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify lint
        run: npm run lint

      - name: Verify prettier
        run: |
          npm run format

  test-integration:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Disable Ollama volume in CI
        run: |
          cat <<EOF > docker-compose.override.yml
          services:
            ollama:
              volumes: []
          EOF

      - name: Create dummy .env file
        run: |
          echo "SUPABASE_URL=http://localhost:54321" > .env
          echo "SUPABASE_API_KEY=dummy" >> .env
          echo "GOOGLE_API_KEY=dummy" >> .env

      - name: Run integration tests
        run: npm run test:integration

  test-e2e:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright deps (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Disable Ollama volume in CI
        run: |
          cat <<EOF > docker-compose.override.yml
          services:
            ollama:
              volumes: []
          EOF

      - name: Create dummy .env file
        run: |
          echo "SUPABASE_URL=http://localhost:54321" > .env
          echo "SUPABASE_API_KEY=dummy" >> .env
          echo "GOOGLE_API_KEY=dummy" >> .env

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  docker-build-and-push:
    if: github.event_name != 'pull_request'
    needs: [lint-and-format, test-integration, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Metadata for Chatbot
        id: meta-chatbot
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/chatbot-app
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Chatbot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/chatbot/Dockerfile
          push: true
          tags: ${{ steps.meta-chatbot.outputs.tags }}
          labels: ${{ steps.meta-chatbot.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Metadata for Vector DB Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/vector-db-worker
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Vector DB Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/vector-db-worker/Dockerfile
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
