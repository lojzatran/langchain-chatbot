name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify lint
        run: npm run lint

      - name: Verify prettier
        run: |
          npm run format
          git diff --exit-code

      - name: Create dummy .env file
        run: |
          echo "SUPABASE_URL=http://localhost:54321" > .env
          echo "SUPABASE_API_KEY=dummy" >> .env
          echo "GOOGLE_API_KEY=dummy" >> .env

      - name: Disable Ollama volume in CI
        run: |
          cat <<EOF > docker-compose.override.yml
          services:
            ollama:
              volumes: []
          EOF

      - name: Run integration tests
        run: npm run test:integration

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Increase E2E timeout
        run: |
          sed -i 's/timeout: 15000/timeout: 30000/' tests/e2e/specs/chatbot-flow.spec.ts

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Chatbot image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/chatbot/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/chatbot-app:latest
            ${{ vars.DOCKERHUB_USERNAME }}/chatbot-app:${{ github.sha }}

      - name: Build and push Vector DB Worker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/vector-db-worker/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/vector-db-worker:latest
            ${{ vars.DOCKERHUB_USERNAME }}/vector-db-worker:${{ github.sha }}
