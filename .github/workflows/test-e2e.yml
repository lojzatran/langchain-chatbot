name: E2E Tests

on:
  workflow_call:

jobs:
  test-e2e:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
      OLLAMA_CHAT_MODEL: smollm:135m
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright deps (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Disable Ollama volume in CI
        run: |
          cat <<EOF > docker-compose.override.yml
          services:
            ollama:
              build:
                args:
                  CHAT_MODEL: smollm:135m
              volumes: []
          EOF

      - name: Create dummy .env file
        run: |
          echo "SUPABASE_URL=http://localhost:54321" > .env
          echo "SUPABASE_API_KEY=dummy" >> .env
          echo "GOOGLE_API_KEY=dummy" >> .env
          echo "CHROMA_HOST=localhost" >> .env
          echo "CHROMA_PORT=8000" >> .env
          echo "CHROMA_SSL=false" >> .env
          echo "RABBITMQ_URL=amqp://localhost" >> .env
          echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
          echo "OLLAMA_CHAT_MODEL=smollm:135m" >> .env

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
