receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  zipkin/nontls:
    endpoint: 'http://zipkin:9411/api/v2/spans'
    format: proto

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug, zipkin/nontls]
    metrics:
      receivers: [otlp]
      exporters: [debug]
    logs:
      receivers: [otlp]
      exporters: [debug]
